      provider: local_llama
      n_ctx: 262144
      max_tokens: 32768
      supports_reasoning: true
      enable_search: false   # локальные модели без поиска
      enable_thinking: true

providers:
  local_llama:
    type: llama_server
    base_url: "http://main-srv:8081/v1/chat/completions"
    timeout: 1200
    retry:
      max_attempts: 3
      backoff_seconds: 1.0

  dashscope:
    type: openai_compatible
    base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions"
    api_key_env: "DASHSCOPE_API_KEY"
    timeout: 320
    retry:
      max_attempts: 2
      backoff_seconds: 0.5

defaults:
  queue:
    enabled: false
    max_size: 10
  logging:
    request_body: false
    response_body: false